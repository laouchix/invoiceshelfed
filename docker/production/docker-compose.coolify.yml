#-------------------------------------------------------------
# InvoiceShelf Coolify production profile (MariaDB)
#-------------------------------------------------------------
# Usage notes:
# - Set APP_URL and SESSION_DOMAIN to your public domain.
# - Keep APP_ENV=production and APP_DEBUG=false.
# - Configure secure DB credentials and APP_KEY in Coolify env vars.
# - Persist both database and storage volumes.

services:
  database:
    image: mariadb:10.11
    environment:
      - MYSQL_DATABASE=${DB_DATABASE:-invoiceshelf}
      - MYSQL_USER=${DB_USERNAME:-invoiceshelf}
      - MYSQL_PASSWORD=${DB_PASSWORD:-change_me}
      - MARIADB_ROOT_PASSWORD=${DB_ROOT_PASSWORD:-change_root_password}
    volumes:
      - invoiceshelf_mysql:/var/lib/mysql
    networks:
      - invoiceshelf
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${DB_ROOT_PASSWORD:-change_root_password}"]
      interval: 15s
      timeout: 10s
      retries: 10

  webapp:
    build:
      context: ../../
      dockerfile: docker/production/Dockerfile
    environment:
      - APP_NAME=${APP_NAME:-InvoiceShelf}
      - APP_ENV=${APP_ENV:-production}
      - APP_DEBUG=${APP_DEBUG:-false}
      - APP_URL=${APP_URL:-https://billing.example.com}
      - APP_KEY=${APP_KEY:-}
      - DB_CONNECTION=${DB_CONNECTION:-mariadb}
      - DB_HOST=${DB_HOST:-database}
      - DB_PORT=${DB_PORT:-3306}
      - DB_DATABASE=${DB_DATABASE:-invoiceshelf}
      - DB_USERNAME=${DB_USERNAME:-invoiceshelf}
      - DB_PASSWORD=${DB_PASSWORD:-change_me}
      - CACHE_STORE=${CACHE_STORE:-file}
      - SESSION_DRIVER=${SESSION_DRIVER:-file}
      - SESSION_LIFETIME=${SESSION_LIFETIME:-240}
      - SESSION_DOMAIN=${SESSION_DOMAIN:-billing.example.com}
      - SANCTUM_STATEFUL_DOMAINS=${SANCTUM_STATEFUL_DOMAINS:-billing.example.com}
      - TRUSTED_PROXIES=${TRUSTED_PROXIES:-*}
      - AUTO_RUN_MIGRATIONS=${AUTO_RUN_MIGRATIONS:-true}
      - AUTO_RUN_DB_SEED=${AUTO_RUN_DB_SEED:-false}
      - AUTO_RUN_STORAGE_LINK=${AUTO_RUN_STORAGE_LINK:-true}
    volumes:
      - invoiceshelf_storage:/var/www/html/storage
    networks:
      - invoiceshelf
    restart: unless-stopped
    depends_on:
      - database
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/up || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  worker:
    build:
      context: ../../
      dockerfile: docker/production/Dockerfile
    command: ["php", "artisan", "queue:work", "--sleep=3", "--tries=3", "--timeout=90", "--no-interaction"]
    environment:
      - APP_NAME=${APP_NAME:-InvoiceShelf}
      - APP_ENV=${APP_ENV:-production}
      - APP_DEBUG=${APP_DEBUG:-false}
      - APP_URL=${APP_URL:-https://billing.example.com}
      - APP_KEY=${APP_KEY:-}
      - DB_CONNECTION=${DB_CONNECTION:-mariadb}
      - DB_HOST=${DB_HOST:-database}
      - DB_PORT=${DB_PORT:-3306}
      - DB_DATABASE=${DB_DATABASE:-invoiceshelf}
      - DB_USERNAME=${DB_USERNAME:-invoiceshelf}
      - DB_PASSWORD=${DB_PASSWORD:-change_me}
      - CACHE_STORE=${CACHE_STORE:-file}
      - SESSION_DRIVER=${SESSION_DRIVER:-file}
      - QUEUE_CONNECTION=${QUEUE_CONNECTION:-database}
      - AUTO_RUN_MIGRATIONS=false
      - AUTO_RUN_DB_SEED=false
      - AUTO_RUN_STORAGE_LINK=false
    volumes:
      - invoiceshelf_storage:/var/www/html/storage
    networks:
      - invoiceshelf
    restart: unless-stopped
    depends_on:
      - webapp

  scheduler:
    build:
      context: ../../
      dockerfile: docker/production/Dockerfile
    command: ["sh", "-c", "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"]
    environment:
      - APP_NAME=${APP_NAME:-InvoiceShelf}
      - APP_ENV=${APP_ENV:-production}
      - APP_DEBUG=${APP_DEBUG:-false}
      - APP_URL=${APP_URL:-https://billing.example.com}
      - APP_KEY=${APP_KEY:-}
      - DB_CONNECTION=${DB_CONNECTION:-mariadb}
      - DB_HOST=${DB_HOST:-database}
      - DB_PORT=${DB_PORT:-3306}
      - DB_DATABASE=${DB_DATABASE:-invoiceshelf}
      - DB_USERNAME=${DB_USERNAME:-invoiceshelf}
      - DB_PASSWORD=${DB_PASSWORD:-change_me}
      - CACHE_STORE=${CACHE_STORE:-file}
      - SESSION_DRIVER=${SESSION_DRIVER:-file}
      - AUTO_RUN_MIGRATIONS=false
      - AUTO_RUN_DB_SEED=false
      - AUTO_RUN_STORAGE_LINK=false
    volumes:
      - invoiceshelf_storage:/var/www/html/storage
    networks:
      - invoiceshelf
    restart: unless-stopped
    depends_on:
      - webapp

networks:
  invoiceshelf:

volumes:
  invoiceshelf_mysql:
  invoiceshelf_storage:
